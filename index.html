  </div>

<script>
(function(){
  // Побуквенное появление слогана (эффект печати)
  var TAG_TEXT = 'ENGINEERED FOR EXCELLENCE. PRINTED FOR IMPACT.';
  function buildTag(){
    var tag = document.querySelector('#si-loader .si-loader__tag');
    if(!tag) return;
    tag.textContent = '';
    for(var i=0;i<TAG_TEXT.length;i++){
      var sp = document.createElement('span');
      sp.textContent = TAG_TEXT[i];
      sp.style.animationDelay = (i*40)+'ms';
      tag.appendChild(sp);
    }
  }
  buildTag();
  var firstEntry = false;
  try {
    firstEntry = !sessionStorage.getItem('si_entered');
    if(firstEntry) sessionStorage.setItem('si_entered','1');
  } catch(e){}
  var t0 = Date.now(), MIN = firstEntry ? 2000 : 1000, MAX = firstEntry ? 5000 : 3500;
  function hide(){
    var l = document.getElementById('si-loader');
    if(!l || l.classList.contains('is-done')) return;
    l.classList.add('is-done'); // \u043e\u0441\u0442\u0430\u0451\u0442\u0441\u044f \u0432 DOM \u0434\u043b\u044f \u043f\u043e\u0432\u0442\u043e\u0440\u043d\u043e\u0433\u043e \u043f\u043e\u043a\u0430\u0437\u0430 (\u0441\u043a\u0430\u0447\u0438\u0432\u0430\u043d\u0438\u0435 PDF)
  }
  function ready(){
    var app = document.getElementById('app');
    var mounted = app && app.children.length > 0;
    if(mounted && (Date.now() - t0) >= MIN){ hide(); return; }
    setTimeout(ready, 120);
  }
  setTimeout(hide, MAX); // safety net
  if(document.readyState === 'complete') ready();
  else window.addEventListener('load', ready);
  ready();

  // Симулятор при скачивании PDF / документов
  document.addEventListener('click', function(e){
    var a = e.target && e.target.closest ? e.target.closest('a') : null;
    if(!a) return;
    var href = (a.getAttribute('href')||'').toLowerCase();
    if(a.hasAttribute('download') || /\.pdf(\?|#|$)/.test(href)){
      var l = document.getElementById('si-loader');
      if(l){ l.classList.remove('is-done'); buildTag(); setTimeout(function(){ l.classList.add('is-done'); }, 2200); }
    }
  }, true);
})();
</script>
